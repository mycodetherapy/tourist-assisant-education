# Smoke-набор для offline eval (fixtures в eval/fixtures/)
# Билеты: обновить живыми данными — python3 scripts/refresh_tickets_fixtures.py
cases:
  - id: spb_culture_smoke
    city: Санкт-Петербург
    dates: 1-4 августа 2026
    origin_city: Москва
    user_query: культурная программа
    expect:
      tools:
        - search_roundtrip_tickets
        - search_culture_events
        - search_dining
      sections:
        - tickets
        - events
        - dining
        - lifehacks
      min_restaurant_links: 6
      tickets_markers:
        - "самол"
        - "поезд"
      min_ticket_offers: 2

  - id: msk_weekend_smoke
    city: Москва
    dates: 10-11 октября 2026
    origin_city: Санкт-Петербург
    user_query: выходные, музеи и рестораны
    expect:
      tools: [search_roundtrip_tickets, search_culture_events, search_dining]
      sections: [tickets, events, dining, lifehacks]
      min_restaurant_links: 6
      min_ticket_offers: 2

