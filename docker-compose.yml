# Туристический ассистент: интерактивный CLI (локально и на сервере).
#
# Подготовка (НЕ перезаписывайте существующий .env!):
#   test -f .env || cp .env.example .env
#   # затем отредактируйте .env: LLM_API_KEY и др.
#
# Сборка и запуск:
#   docker compose build
#   docker compose run --rm app
#
# Тесты / eval (без интерактива):
#   docker compose run --rm app python -m unittest discover -s tests -v
#   docker compose run --rm app python -m eval --suite smoke

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tourist-assistant:latest
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/trips.db
      TOURIST_ASSISTANT_IN_DOCKER: "1"
      LANGFUSE_HOST: ${LANGFUSE_HOST_DOCKER:-http://host.docker.internal:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tourist-assistant:latest
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/trips.db
      TOURIST_ASSISTANT_IN_DOCKER: "1"
      LANGFUSE_HOST: ${LANGFUSE_HOST_DOCKER:-http://host.docker.internal:3000}
    volumes:
      - ./data:/app/data
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
